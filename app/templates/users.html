<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
	<div class="card mb-4 p-3">
    	    <h5 class="mb-3">Create New User</h5>
    	    <form method="POST" action="/users/add" class="row g-3 align-items-end">
        	<div class="col-md-3">
            	    <label for="username" class="form-label">Username</label>
            	    <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
        	</div>
        	<div class="col-md-3">
            	    <label for="password" class="form-label">Password</label>
            	    <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
        	</div>
        	<div class="col-md-3">
            	    <label for="role" class="form-label">Role</label>
            	    <select id="role" name="role" class="form-select" required>
                	<option value="admin">Admin</option>
                	<option value="editor">Editor</option>
                	<option value="viewer" selected>Viewer</option>
            	    </select>
        	</div>
        	<div class="col-md-3 d-grid">
            	    <button type="submit" class="btn btn-success">Add User</button>
        	</div>
    	    </form>
	</div>
        <h2>User Management</h2>
        <a href="/" class="btn btn-secondary">Back to Main Page</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
		<th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
		<td>
    		    <a href="/users/edit/{{ user[0] }}" class="btn btn-sm btn-primary">Edit</a>

    		    <form action="/users/delete/{{ user[0] }}" method="POST" style="display:inline;">
        		<button type="submit" class="btn btn-sm btn-danger">Delete</button>
    		    </form>
		</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
</body>
</html>
