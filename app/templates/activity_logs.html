<!DOCTYPE html>
<html>
<head>
    <title>Activity Logs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #000;
            min-height: 100vh;
        }

        h2.page-header {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: #0d6efd;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        /* Back button top center */
        .btn-back-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-back {
            background-color: #ffc107; /* similar to reset button color */
            color: #000;
            font-weight: bold;
        }

        .btn-back:hover {
            background-color: #e0a800;
            color: #000;
        }

        /* Card container for table */
        .card {
            border-radius: 15px;
            padding: 15px;
            background-color: #1a1a1a; /* Dark table box */
        }

        table {
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid yellow; /* Outer border of table */
        }

        table th, table td {
            text-align: center;
            vertical-align: middle;
            color: #ffffff; /* Table content font color */
        }

        table thead th {
            color: #ff2bd6; /* keep header color */
        }

        /* Dark mode sync */
        .dark-mode {
            background-color: #121212;
            color: #e4e4e4;
        }

        .dark-mode .card {
            background-color: #1a1a1a;
        }

        .dark-mode .btn-back {
            background-color: #0d6efd;
            color: #fff;
        }

        .dark-mode .btn-back:hover {
            background-color: #0b5ed7;
            color: #fff;
        }


	/* Force dark background for table */
	.dark-mode .table {
    	    background-color: #1a1a1a !important;
    	    color: #ffffff !important;
	}

	/* Force dark rows */
	.dark-mode .table tbody tr {
    	    background-color: #1a1a1a !important;
	}

	/* Fix striped rows */
	.dark-mode .table-striped > tbody > tr:nth-of-type(odd) {
   	     background-color: #1e1e1e !important;
	}

	/* Table body cells (white text) */
	.dark-mode .table td {
    	    background-color: #1a1a1a !important;
    	    color: #ffffff !important;
	}

	/* Table headers (neon pink) */
	.dark-mode .table thead th {
    	    background-color: #1a1a1a !important;
    	    color: #ff2bd6 !important;
	    font-weight: bold;
	    font-size: 1.2rem;
	}

	/* Add only bottom row lines */
	.dark-mode .table tbody tr {
    	    border-bottom: 1px solid #ffffff !important;
	}

	/* Header bottom line (important for your issue) */
	.dark-mode .table thead tr {
    	   border-bottom: 2px solid #ffffff !important;
	}

    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="page-header">Activity Logs</h2>

    <!-- Back button top center -->
    <div class="btn-back-container">
        <a href="/" class="btn btn-secondary mt-2">Back to Main Page</a>
    </div>

    <div class="card">

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Action</th>
                    <th>Details</th>
                    <th>Timestamp</th>
                </tr>
            </thead>

            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log[0] }}</td>
                    <td>{{ log[1] }}</td>
                    <td>{{ log[2] }}</td>
                    <td>{{ log[3] }}</td>
                    <td>{{ log[4] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

<!-- Sync dark mode like main page -->
<script>
    document.addEventListener("DOMContentLoaded", function(){
        if(localStorage.getItem("theme") === "dark"){
            document.body.classList.add("dark-mode");
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
