<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-4">

<h2>Edit User</h2>

<div class="card bg-secondary text-light p-4">

    <p><strong>Username:</strong> {{ user[1] }}</p>

    <!-- Change Role -->
    <h5>Change Role</h5>

    <form method="POST" action="/users/update_role/{{ user[0] }}">

        <div class="mb-3">
            <label class="form-label">Role</label>

            <select name="role" class="form-control">

                <option value="admin" {% if user[2]=='admin' %}selected{% endif %}>Admin</option>
                <option value="editor" {% if user[2]=='editor' %}selected{% endif %}>Editor</option>
                <option value="viewer" {% if user[2]=='viewer' %}selected{% endif %}>Viewer</option>

            </select>
        </div>

        <button type="submit" class="btn btn-primary">Update Role</button>

    </form>

    <hr>

    <!-- Reset Password -->
    <h5>Reset Password</h5>

    <form method="POST" action="/users/update_password/{{ user[0] }}">

        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-warning">Reset Password</button>

    </form>

</div>

<br>

<a href="/users" class="btn btn-secondary">Back to User Management</a>

</div>
</body>
</html>
