<!-- templates/edit_part.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Edit Part</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <style>
            body {
            	font-family: 'Roboto', sans-serif;
            	background-color: #f8f9fa; /* same light background as main page */
            }

            h2 {
            	font-family: 'Montserrat', sans-serif;
            	font-weight: 700;
		font-size: 3rem;
    		color: #0d6efd;
    		text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    		letter-spacing: 1px;
		text-align: center;
            }

            /* Dark Mode */
            .dark-mode {
            	background-color: #121212;
            	color: #e4e4e4;
            }

            /* Dark form inputs with proper text color on hover/focus/autocomplete */
            .dark-mode .form-control {
            	background-color: #1a1a1a;
            	color: #ffffff !important;
            	-webkit-text-fill-color: #ffffff !important; /* fixes hover/focus/autocomplete black text */
            	border: 1px solid #ffffff;
            }

            .dark-mode .form-control::placeholder {
            	color: #bbbbbb;
            }

            /* Keep text white on hover/focus for dark mode */
            .dark-mode .form-control:focus,
            .dark-mode .form-control:hover {
            	background-color: #1a1a1a !important;
            	color: #ffffff !important;
            	border: 1px solid #ffffff !important;
            	box-shadow: none !important;
            }

	    /* Fix text color and background on autofill/hover/focus for Model and Specs in dark mode */
	    .dark-mode input:-webkit-autofill,
	    .dark-mode input:-webkit-autofill:hover,
	    .dark-mode input:-webkit-autofill:focus {
    		background-color: #1a1a1a !important;
    		color: #ffffff !important;
    		-webkit-box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
    		box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
    		-webkit-text-fill-color: #ffffff !important;
	    }

            /* Labels */
            .dark-mode label {
            	color: #ffffff;
            }

            /* Buttons */
            .dark-mode .btn-primary {
            	background-color: #0d6efd;
            	border-color: #0d6efd;
            }

            /* Links */
            .dark-mode a {
            	color: #8ab4ff;
            }

            /* Full page dark background */
            .dark-mode,
            .dark-mode html,
            .dark-mode body {
            	background-color: #121212 !important;
            	color: #e4e4e4 !important;
            	min-height: 100vh;
            }

            /* Container background in dark mode */
            .dark-mode .container {
            	background-color: #121212;
    	    }

	    .dark-mode h2 {
    		color: #0d6efd !important;
    		text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    		letter-spacing: 1px;
	    }
    	</style>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2>Edit Part</h2>
        <form method="POST">
            <div class="mb-3">
    		<label>Category</label>
    		<select name="category" class="form-control" required>
        	    {% for cat in categories %}
            		<option value="{{ cat }}" {% if cat == part[1] %}selected{% endif %}>
                	    {{ cat }}
            		</option>
        	    {% endfor %}
    		</select>
	    </div>
	    <div class="mb-3">
                <label>Model</label>
                <input type="text" name="model" class="form-control" placeholder="Enter model" value="{{ part[2] }}" required>
            </div>
            <div class="mb-3">
                <label>Specs</label>
                <input type="text" name="specs" class="form-control" placeholder="Enter specs" value="{{ part[3] }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
    	if(localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
    	}
    });
    </script>
</body>
</html>
