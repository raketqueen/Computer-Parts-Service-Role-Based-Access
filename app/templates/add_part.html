<!DOCTYPE html>
<html>
<head>
    <title>Add New Part</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    	<style>
	body {
    	    font-family: 'Roboto', sans-serif;
    	    background-color: #f8f9fa;
	}

	h1 {
    	    font-family: 'Montserrat', sans-serif;
    	    font-weight: 700;
    	    font-size: 3rem; /* same as main page */
    	    color: #0d6efd; /* same blue as main page */
    	    text-shadow: 1px 1px 2px rgba(0,0,0,0.2); /* subtle shadow like main page */
  	    letter-spacing: 1px; /* match main page spacing */
	    text-align: center;
	}

	/* Dark Mode */
	.dark-mode {
    	    background-color: #121212;
    	    color: #e4e4e4;
	}

	/* Dark form inputs with proper text color on hover/focus/autocomplete */
	.dark-mode .form-control {
    	    background-color: #1a1a1a;
    	    color: #ffffff !important;
    	    -webkit-text-fill-color: #ffffff !important; /* fixes hover/focus/autocomplete black text */
    	    border: 1px solid #ffffff;
	}

	.dark-mode .form-control::placeholder {
    	    color: #bbbbbb;
	}

	/* Keep text white on hover/focus for dark mode */
	.dark-mode .form-control:focus,
	.dark-mode .form-control:hover {
    	    background-color: #1a1a1a !important;
    	    color: #ffffff !important;
    	    border: 1px solid #ffffff !important;
    	    box-shadow: none !important;
	}

	/* Labels */
	.dark-mode label {
    	    color: #ffffff;
	}

	/* Buttons */
	.dark-mode .btn-primary {
    	    background-color: #0d6efd;
    	    border-color: #0d6efd;
	}

	/* Links */
	.dark-mode a {
    	    color: #8ab4ff;
	}

	/* Full page dark background */
	.dark-mode,
	.dark-mode html,
	.dark-mode body {
    	    background-color: #121212 !important;
    	    color: #e4e4e4 !important;
    	    min-height: 100vh;
	}

	/* Container background in dark mode */
	.dark-mode .container {
    	    background-color: #121212;
	}

	/* H1 heading in dark mode */
	.dark-mode h1 {
    	    color: #0d6efd !important;
	    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    	    letter-spacing: 1px;
	}

	.dark-mode input:-webkit-autofill,
	.dark-mode input:-webkit-autofill:hover,
	.dark-mode input:-webkit-autofill:focus {
    	    background-color: #1a1a1a !important;
    	    color: #ffffff !important;
    	    -webkit-box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
    	    box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
	}
	</style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1>Add New Part</h1>
    <form method="POST">
        <div class="mb-3">
	    <label for="category">Category</label>
       	    <input list="category_list" name="category" id="category" class="form-control" placeholder="Select or type new category" required>
    	    <datalist id="category_list">
        	{% for cat in categories %}
            	    <option value="{{ cat }}">
        	{% endfor %}
    	    </datalist>
	</div>
        <div class="mb-3">
    	    <label>Model</label>
    	    <input type="text" name="model" class="form-control" placeholder="Enter model" required>
	</div>

	<div class="mb-3">
    	    <label>Specs</label>
    	    <input type="text" name="specs" class="form-control" placeholder="Enter specs" required>
	</div>

	<button type="submit" class="btn btn-primary">Add Part</button>
    </form>
    <br>
    <a href="/">Back to PC Hardware Inventory</a>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
    	if(localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
    	}
    });
    </script>
</div>
</body>
</html>
